
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_HOST=db        # points to the db service inside Docker
    depends_on:
      db:
        condition: service_healthy  # wait until Postgres is actually ready
    restart: on-failure

  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5432:5432"             # exposed so you can connect via pgAdmin/DBeaver
    environment:
      - POSTGRES_USER=acuvia
      - POSTGRES_PASSWORD=acuvia
      - POSTGRES_DB=acuvia
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acuvia -d acuvia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    name: acuvia_db_data