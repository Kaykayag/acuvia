name: acuvia_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State management & routing ──────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  go_router: ^17.2.3

  # ── Networking ──────────────────────────────────────────────────────────
  dio: ^5.9.2
  http: ^1.2.0                  # ← added (Overpass API calls)

  # ── Serialization ───────────────────────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # ── Environment & utils ─────────────────────────────────────────────────
  flutter_dotenv: ^6.0.1
  intl: ^0.20.2
  google_fonts: ^8.1.0

  # ── Map & Location ───────────────────────────────────────────────────────
  flutter_map: ^6.1.0           # ← added (OpenStreetMap renderer)
  latlong2: ^0.9.0              # ← added (LatLng type for flutter_map)
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # ── Other ────────────────────────────────────────────────────────────────
  speech_to_text: ^7.4.0
  url_launcher: ^6.3.2

 #printing

  pdf: ^3.10.8
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  

flutter:
  uses-material-design: true

  assets:
    - assets/acuvia_logo.png
    - assets/google 1.png
    - assets/guy on phone.png
    - assets/Home.png
    - assets/Clipboard.png
    - assets/Book open.png
    - assets/person.png
    - assets/temperature 1.png
    - assets/headache 1.png
    - assets/heart 1.png
    - assets/lungs 1.png
    - assets/nausea 1.png
    - assets/dizziness 1.png
    - assets/other.png
    - assets/Check circle.png
    - assets/danger.png
    - assets/alert 1.png
    - .env